server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression (utile pour le gros JSON ~3,2 Mo)
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types application/json application/javascript text/css text/plain image/svg+xml;

    # Cache court pour le HTML, plus long pour les données/assets
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    # Pas de JSON embarqué : /data/ renvoie un 404 propre (l'app bascule alors
    # sur l'écran d'upload). Un fichier déposé reste côté navigateur.
    location /data/ {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

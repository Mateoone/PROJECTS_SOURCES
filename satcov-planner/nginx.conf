# Cloud Run injecte le port via la variable PORT (8080 par défaut).
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Assets immuables (hash dans le nom) → cache long
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA : tout le reste retombe sur index.html (les vrais fichiers, dont les
    # assets Cesium, sont servis directement par try_files).
    location / {
        try_files $uri $uri/ /index.html;
    }
}

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 800" width="1180" height="800" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#6b7280"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1180" height="800" fill="#ffffff"/>

  <text x="40" y="40" font-size="25" font-weight="700" fill="#1f2430">SATCOM Coverage Engine — Architecture</text>
  <text x="40" y="64" font-size="13.5" fill="#6b7280">Un cœur de physique unique, des clients qui ne font que l'afficher — déployé en service unique sur Google Cloud Run.</text>

  <!-- TIER 1 : sources externes -->
  <text x="40" y="98" font-size="11.5" font-weight="700" letter-spacing="1" fill="#9097a3">SOURCES EXTERNES  ·  CDN / WEB</text>
  <g font-size="13">
    <rect x="40"  y="108" width="250" height="58" rx="9" fill="#f3f4f6" stroke="#cbd0d8"/>
    <text x="56" y="131" font-weight="700" fill="#374151">Celestrak</text>
    <text x="56" y="151" font-size="11.5" fill="#6b7280">TLE réels : Syracuse, Inmarsat GX, Kuiper, Starlink</text>
    <rect x="325" y="108" width="250" height="58" rx="9" fill="#f3f4f6" stroke="#cbd0d8"/>
    <text x="341" y="131" font-weight="700" fill="#374151">Mapbox</text>
    <text x="341" y="151" font-size="11.5" fill="#6b7280">imagerie satellite « Glow globe »</text>
    <rect x="610" y="108" width="250" height="58" rx="9" fill="#f3f4f6" stroke="#cbd0d8"/>
    <text x="626" y="131" font-weight="700" fill="#374151">Wikipédia / Commons</text>
    <text x="626" y="151" font-size="11.5" fill="#6b7280">fiches &amp; vidéos des satellites</text>
    <rect x="895" y="108" width="250" height="58" rx="9" fill="#f3f4f6" stroke="#cbd0d8"/>
    <text x="911" y="131" font-weight="700" fill="#374151">CesiumJS · satellite.js</text>
    <text x="911" y="151" font-size="11.5" fill="#6b7280">globe 3D &amp; propagation SGP4</text>
  </g>

  <!-- arrows external -> service -->
  <g stroke="#6b7280" stroke-width="1.4" marker-end="url(#arr)" fill="none">
    <path d="M165,166 L165,196"/>
    <path d="M450,166 L450,196"/>
    <path d="M735,166 L735,196"/>
    <path d="M1020,166 L1020,196"/>
  </g>

  <!-- TIER 2 : Cloud Run -->
  <rect x="40" y="198" width="1105" height="378" rx="14" fill="#fbfcfe" stroke="#4f7fd0" stroke-width="1.6"/>
  <text x="62" y="226" font-size="12.5" font-weight="700" letter-spacing=".6" fill="#2f5da8">GOOGLE CLOUD RUN  ·  satcom-coverage-engine  ·  europe-west9  ·  accès public</text>

  <!-- Interfaces -->
  <rect x="64" y="244" width="498" height="150" rx="11" fill="#eaf1fb" stroke="#2f7fb8"/>
  <text x="80" y="268" font-size="12.5" font-weight="700" fill="#1d4e78">INTERFACES WEB — servies sur /ui (même origine que l'API)</text>
  <g font-size="12.5">
    <rect x="80"  y="282" width="222" height="46" rx="8" fill="#ffffff" stroke="#bcd2ea"/>
    <text x="93" y="300" font-weight="700" fill="#1d4e78">index — accueil</text>
    <text x="93" y="318" font-size="11" fill="#6b7280">page d'entrée + doc API</text>
    <rect x="320" y="282" width="226" height="46" rx="8" fill="#ffffff" stroke="#bcd2ea"/>
    <text x="333" y="300" font-weight="700" fill="#1d4e78">coverage3d — globe 3D</text>
    <text x="333" y="318" font-size="11" fill="#6b7280">Cesium, TLE réels, animation</text>
    <rect x="80"  y="336" width="222" height="46" rx="8" fill="#ffffff" stroke="#bcd2ea"/>
    <text x="93" y="354" font-weight="700" fill="#1d4e78">scenarios — 4 scénarios</text>
    <text x="93" y="372" font-size="11" fill="#6b7280">comparatif, pluie, antennes</text>
    <rect x="320" y="336" width="226" height="46" rx="8" fill="#ffffff" stroke="#bcd2ea"/>
    <text x="333" y="354" font-weight="700" fill="#1d4e78">timeline — visibilité</text>
    <text x="333" y="372" font-size="11" fill="#6b7280">ruban servant, handovers</text>
  </g>

  <!-- API -->
  <rect x="622" y="244" width="500" height="150" rx="11" fill="#efeefe" stroke="#6b5fd0"/>
  <text x="638" y="268" font-size="12.5" font-weight="700" fill="#3c3489">API FastAPI</text>
  <g font-size="12.5">
    <rect x="638" y="282" width="226" height="46" rx="8" fill="#ffffff" stroke="#cfc8f2"/>
    <text x="651" y="300" font-weight="700" fill="#3c3489">POST /link</text>
    <text x="651" y="318" font-size="11" fill="#6b7280">liaison GEO instantanée</text>
    <rect x="882" y="282" width="226" height="46" rx="8" fill="#ffffff" stroke="#cfc8f2"/>
    <text x="895" y="300" font-weight="700" fill="#3c3489">POST /scenario</text>
    <text x="895" y="318" font-size="11" fill="#6b7280">scénario LEO (TLE / Walker)</text>
    <rect x="638" y="336" width="226" height="46" rx="8" fill="#ffffff" stroke="#cfc8f2"/>
    <text x="651" y="354" font-weight="700" fill="#3c3489">GET /mapbox-config</text>
    <text x="651" y="372" font-size="11" fill="#6b7280">token hors-dépôt (env)</text>
    <rect x="882" y="336" width="226" height="46" rx="8" fill="#ffffff" stroke="#cfc8f2"/>
    <text x="895" y="354" font-weight="700" fill="#3c3489">GET /health · /docs</text>
    <text x="895" y="372" font-size="11" fill="#6b7280">sonde + Swagger</text>
  </g>

  <!-- interfaces -> API arrow -->
  <path d="M562,318 L620,318" stroke="#6b7280" stroke-width="1.6" marker-end="url(#arr)" fill="none"/>

  <!-- Core -->
  <rect x="64" y="410" width="1058" height="148" rx="11" fill="#e4f5ee" stroke="#1d9e75"/>
  <text x="80" y="434" font-size="12.5" font-weight="700" fill="#0f6e56">CŒUR PHYSIQUE — source unique de vérité (bilan porté de la feuille Master, validé)</text>
  <g font-size="12.5">
    <rect x="80"  y="448" width="248" height="92" rx="8" fill="#ffffff" stroke="#bfe3d4"/>
    <text x="94" y="470" font-weight="700" fill="#0f6e56">geometry</text>
    <text x="94" y="490" font-size="11" fill="#6b7280">look-angles GEO</text>
    <text x="94" y="508" font-size="11" fill="#6b7280">propagation LEO (SGP4 /</text>
    <text x="94" y="524" font-size="11" fill="#6b7280">Walker)</text>
    <rect x="346" y="448" width="248" height="92" rx="8" fill="#ffffff" stroke="#bfe3d4"/>
    <text x="360" y="470" font-weight="700" fill="#0f6e56">rf</text>
    <text x="360" y="490" font-size="11" fill="#6b7280">FSPL, C/N up/down/requis,</text>
    <text x="360" y="508" font-size="11" fill="#6b7280">marge, table MODCOD</text>
    <text x="360" y="524" font-size="11" fill="#6b7280">ACM DVB-S2X</text>
    <rect x="612" y="448" width="248" height="92" rx="8" fill="#ffffff" stroke="#bfe3d4"/>
    <text x="626" y="470" font-weight="700" fill="#0f6e56">engine</text>
    <text x="626" y="490" font-size="11" fill="#6b7280">orchestration ;</text>
    <text x="626" y="508" font-size="11" fill="#6b7280">satellite servant, handovers,</text>
    <text x="626" y="524" font-size="11" fill="#6b7280">disponibilité %</text>
    <rect x="878" y="448" width="230" height="92" rx="8" fill="#ffffff" stroke="#bfe3d4"/>
    <text x="892" y="470" font-weight="700" fill="#0f6e56">models</text>
    <text x="892" y="490" font-size="11" fill="#6b7280">contrat Pydantic ;</text>
    <text x="892" y="508" font-size="11" fill="#6b7280">frontière stable</text>
    <text x="892" y="524" font-size="11" fill="#6b7280">physique ↔ rendu</text>
  </g>

  <!-- API <-> core arrows -->
  <path d="M872,396 L872,408" stroke="#6b7280" stroke-width="1.6" marker-end="url(#arr)" fill="none"/>
  <text x="884" y="406" font-size="11" fill="#6b7280">appel</text>
  <path d="M300,408 L300,396" stroke="#6b7280" stroke-width="1.6" marker-end="url(#arr)" fill="none"/>
  <text x="312" y="406" font-size="11" font-weight="600" fill="#0f6e56">LinkResult →</text>

  <!-- TIER 3 : clients -->
  <text x="40" y="616" font-size="11.5" font-weight="700" letter-spacing="1" fill="#9097a3">CLIENTS</text>
  <rect x="40"  y="626" width="700" height="58" rx="9" fill="#fcf3e2" stroke="#d8b24e"/>
  <text x="56" y="650" font-size="13" font-weight="700" fill="#7a5a10">Navigateur</text>
  <text x="56" y="670" font-size="11.5" fill="#8a6a20">index · coverage3d · scenarios · timeline — appels HTTPS même origine (pas de CORS)</text>
  <rect x="770" y="626" width="375" height="58" rx="9" fill="#fcf3e2" stroke="#d8b24e" stroke-dasharray="5 4"/>
  <text x="786" y="650" font-size="13" font-weight="700" fill="#7a5a10">Unity / Unreal / Ventuz</text>
  <text x="786" y="670" font-size="11.5" fill="#8a6a20">à venir — ne consomment que des LinkResult</text>

  <!-- clients -> interfaces -->
  <path d="M300,624 L300,396" stroke="#c79a22" stroke-width="1.4" stroke-dasharray="2 3" marker-end="url(#arr)" fill="none" opacity="0.8"/>
  <path d="M955,624 L955,576" stroke="#c79a22" stroke-width="1.4" stroke-dasharray="2 3" marker-end="url(#arr)" fill="none" opacity="0.8"/>

  <text x="40" y="724" font-size="11" fill="#9097a3">Déploiement : build Cloud Build (--source) · imagerie Mapbox injectée par variable d'environnement (token hors dépôt) · clients vanilla JS, zéro build.</text>
</svg>

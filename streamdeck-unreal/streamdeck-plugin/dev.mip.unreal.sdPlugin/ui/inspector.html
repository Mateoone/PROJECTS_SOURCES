<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8" />
	<title>Unreal Bridge</title>
	<style>
		body { font-family: -apple-system, "Segoe UI", sans-serif; font-size: 12px; color: #d8d8d8; background: #2d2d2d; margin: 0; padding: 8px; }
		.row { display: flex; align-items: center; margin-bottom: 8px; }
		.row label { width: 80px; text-align: right; margin-right: 8px; color: #969696; }
		.row input, .row textarea { flex: 1; background: #3d3d3d; border: 1px solid #4d4d4d; color: #fff; border-radius: 4px; padding: 4px 6px; }
		textarea { resize: vertical; min-height: 40px; font-family: monospace; }
		.hint { color: #6d6d6d; margin: 0 0 8px 88px; }
	</style>
</head>
<body>
	<div class="row"><label for="host">UE Host</label><input id="host" type="text" placeholder="127.0.0.1" /></div>
	<div class="row"><label for="port">UE Port</label><input id="port" type="number" placeholder="5051" /></div>
	<div class="row"><label for="action">Action</label><input id="action" type="text" placeholder="Fire" /></div>
	<div class="row"><label for="payload">Payload</label><textarea id="payload" placeholder='{"power":10}  (JSON or plain text)'></textarea></div>
	<div class="row"><label for="title">Title</label><input id="title" type="text" placeholder="button label" /></div>
	<p class="hint">Sent to UE as: {"action": ..., "payload": ...} on key press.</p>

	<script>
		let ws, uuid, actionInfo, settings = {};
		const ids = ["host", "port", "action", "payload", "title"];

		function connectElgatoStreamDeckSocket(inPort, inUUID, inRegisterEvent, inInfo, inActionInfo) {
			uuid = inUUID;
			actionInfo = JSON.parse(inActionInfo);
			settings = actionInfo.payload.settings || {};

			ws = new WebSocket("ws://127.0.0.1:" + inPort);
			ws.onopen = () => ws.send(JSON.stringify({ event: inRegisterEvent, uuid: inUUID }));
			ws.onmessage = () => {};

			ids.forEach((id) => {
				const el = document.getElementById(id);
				if (settings[id] !== undefined) el.value = settings[id];
				el.addEventListener("input", save);
			});
		}

		function save() {
			ids.forEach((id) => { settings[id] = document.getElementById(id).value; });
			if (ws && ws.readyState === 1) {
				ws.send(JSON.stringify({
					event: "setSettings",
					context: uuid,
					payload: settings
				}));
			}
		}
	</script>
</body>
</html>
